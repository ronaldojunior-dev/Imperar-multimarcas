services:
  postgres:
    image: postgres:16-alpine
    container_name: imperar_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: imperar_multimarcas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: imperar_app
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/imperar_multimarcas?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: troque-por-uma-chave-segura-com-32-caracteres
      APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    volumes:
      - ./public/uploads:/app/public/uploads

volumes:
  postgres_data:
